# Reef — top-level docker compose
#
# Bring-up order: atlas (MCP signature registry) -> lobstertrap-reef -> victim
# -> stage-ui -> quote -> dast-a
#
# A-5 ships the atlas service end-to-end. Other services come online as their
# owning agents land their implementations.

version: "3.9"

services:
  atlas:
    build:
      context: ./reef/control-plane/atlas
      dockerfile: Dockerfile
    image: reef/atlas:dev
    container_name: reef-atlas
    environment:
      - REEF_ATLAS_DATA_DIR=/data
      - REEF_ATLAS_PUBLISHER_KEYS_DIR=/keys/publishers
      - REEF_ATLAS_AUDIT_FILE=/data/audit.jsonl
      - REEF_ATLAS_SEED_ON_BOOT=1
      - REEF_ATLAS_HOST=0.0.0.0
      - REEF_ATLAS_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - atlas-data:/data
      - atlas-keys:/keys
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - reef

  policy-bus:
    build:
      context: ./reef/control-plane/policy_bus
      dockerfile: Dockerfile
    image: reef/policy-bus:dev
    container_name: reef-policy-bus
    environment:
      - REEF_POLICY_BUS_DATA_DIR=/data
      - REEF_POLICY_BUS_AUDIT_FILE=/data/audit.jsonl
      - REEF_POLICY_BUS_PUBLISHER_KEYS_DIR=/keys/publishers
      - REEF_POLICY_BUS_GRPC_PORT=50051
      - REEF_POLICY_BUS_ADMIN_PORT=50052
      # Operators MUST set REEF_POLICY_BUS_ADMIN_TOKEN in their compose .env
      # file. When unset, the bus generates a random token on first boot and
      # logs the fingerprint (see policy_bus/data/admin_token.txt).
      - REEF_POLICY_BUS_ADMIN_TOKEN=${REEF_POLICY_BUS_ADMIN_TOKEN:-}
    ports:
      - "50051:50051"
      - "50052:50052"
    volumes:
      - policy-bus-data:/data
      - policy-bus-keys:/keys
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:50052/healthz').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - reef

  quote:
    build:
      context: ./reef/control-plane/quote
      dockerfile: Dockerfile
    image: reef/quote:dev
    container_name: reef-quote
    environment:
      - REEF_QUOTE_DATA_DIR=/data
      - REEF_QUOTE_SAMPLES_DIR=/samples
      - REEF_QUOTE_SIGNER_PRIV_KEY=/keys/quote-signer.key
      - REEF_QUOTE_SIGNER_PUB_KEY=/keys/quote-signer.pub
      - REEF_QUOTE_SIGNER_KEY_ID=reef-quote-prod-signer
      - REEF_QUOTE_SAMPLE_ON_BOOT=true
      - REEF_QUOTE_HOST=0.0.0.0
      - REEF_QUOTE_PORT=8082
      - REEF_ATLAS_URL=http://atlas:8080
      - REEF_POLICY_BUS_ADMIN_URL=http://policy-bus:50052
      - REEF_DAST_A_URL=http://dast-a:8088
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL:-gemini-2.0-pro-exp}
      - REEF_UNDERWRITER_COVERAGE_AMOUNT_USD=${REEF_UNDERWRITER_COVERAGE_AMOUNT_USD:-5000000}
    ports:
      - "8082:8082"
    volumes:
      - quote-data:/data
      - quote-keys:/keys
      # Mount the host samples dir so the committed sample-ria.pdf is the
      # one the container serves (instead of re-generating a fresh one on
      # every boot). Read-only because the boot helper only writes here
      # when REEF_QUOTE_SAMPLE_ON_BOOT triggers a regeneration.
      - ./reef/control-plane/quote/samples:/samples
    depends_on:
      - atlas
      - policy-bus
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8082/healthz').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - reef

volumes:
  atlas-data:
  atlas-keys:
  policy-bus-data:
  policy-bus-keys:
  quote-data:
  quote-keys:

networks:
  reef:
    driver: bridge
